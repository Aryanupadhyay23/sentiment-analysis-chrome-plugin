<!DOCTYPE html>
<html>

<head>

  <meta charset="UTF-8">

  <title>
    YouTube Sentiment Analyzer
  </title>

  <style>

    body {

      font-family:
        "Segoe UI",
        system-ui,
        sans-serif;

      background:
        #0f172a;

      color:
        #f8fafc;

      margin: 0;

      padding: 12px;

      width: 520px;

      min-width: 520px;

      max-width: 520px;

      height: 720px;

      overflow-y: auto;

      overflow-x: hidden;

      box-sizing: border-box;
    }

    h1 {

      font-size: 20px;

      margin-top: 0;

      margin-bottom: 18px;

      text-align: center;

      color: #38bdf8;

      line-height: 1.4;
    }

    .section {

      background: #1e293b;

      border-radius: 14px;

      padding: 14px;

      margin-bottom: 14px;

      border:
        1px solid #334155;

      overflow: hidden;
    }

    .section-title {

      font-size: 14px;

      margin-bottom: 14px;

      color: #7dd3fc;

      text-transform: uppercase;

      letter-spacing: 1px;

      font-weight: 700;
    }

    .metrics {

      display: grid;

      grid-template-columns:
        repeat(2, 1fr);

      gap: 10px;
    }

    .metric {

      background: #020817;

      padding: 12px;

      border-radius: 10px;

      text-align: center;

      border:
        1px solid #334155;

      min-height: 82px;

      display: flex;

      flex-direction: column;

      justify-content: center;
    }

    .metric-title {

      font-size: 11px;

      color: #94a3b8;

      margin-bottom: 6px;

      text-transform: uppercase;
    }

    .metric-value {

      font-size: 18px;

      font-weight: 700;
    }

    .controls {

      display: grid;

      grid-template-columns:
        repeat(2, 1fr);

      gap: 8px;

      margin-bottom: 12px;
    }

    button {

      width: 100%;

      background: #334155;

      color: white;

      border: none;

      padding: 10px;

      border-radius: 8px;

      cursor: pointer;

      font-size: 12px;

      font-weight: 600;
    }

    button:hover {

      background: #475569;
    }

    input {

      width: 100%;

      padding: 10px;

      margin-bottom: 12px;

      border-radius: 8px;

      border:
        1px solid #334155;

      background: #020817;

      color: white;

      font-size: 13px;

      box-sizing: border-box;

      outline: none;
    }

    input:focus {

      border-color: #38bdf8;
    }

    .comment-list {

      max-height: 400px;

      overflow-y: auto;

      overflow-x: hidden;
    }

    .comment-list::-webkit-scrollbar {

      width: 6px;
    }

    .comment-list::-webkit-scrollbar-thumb {

      background: #334155;

      border-radius: 10px;
    }

    .comment {

      background: #020817;

      padding: 12px;

      border-radius: 10px;

      margin-bottom: 10px;

      font-size: 13px;

      line-height: 1.6;

      word-break: break-word;

      overflow-wrap: break-word;

      border-left: 4px solid #334155;
    }

    .pos-border {

      border-left-color: #22c55e;
    }

    .neu-border {

      border-left-color: #eab308;
    }

    .neg-border {

      border-left-color: #ef4444;
    }

    .badge {

      margin-top: 10px;

      display: inline-block;

      padding: 4px 8px;

      border-radius: 6px;

      font-size: 10px;

      font-weight: 700;

      text-transform: uppercase;
    }

    .positive {

      background:
        rgba(34,197,94,0.15);

      color:
        #4ade80;
    }

    .neutral {

      background:
        rgba(234,179,8,0.15);

      color:
        #facc15;
    }

    .negative {

      background:
        rgba(239,68,68,0.15);

      color:
        #f87171;
    }

    canvas {

      width: 100% !important;

      height: 240px !important;

      max-width: 100%;

      display: block;
    }

    #wordCloud {

      min-height: 180px;

      max-height: 250px;

      overflow-y: auto;

      overflow-x: hidden;

      padding: 10px;

      line-height: 1.8;

      text-align: center;

      border-radius: 12px;

      background: #020817;

      border:
        1px solid #334155;
    }

    .loading {

      text-align: center;

      padding: 40px 20px;

      color: #94a3b8;

      font-size: 14px;
    }

    .spinner {

      border:
        3px solid #334155;

      border-top:
        3px solid #38bdf8;

      border-radius: 50%;

      width: 26px;

      height: 26px;

      animation:
        spin 1s linear infinite;

      margin:
        0 auto 14px auto;
    }

    @keyframes spin {

      0% {

        transform:
          rotate(0deg);
      }

      100% {

        transform:
          rotate(360deg);
      }
    }

  </style>

</head>

<body>

  <h1>
    YouTube Sentiment Analyzer
  </h1>

  <div id="output">

    <div class="section">

      <div class="loading">

        <div class="spinner"></div>

        Analyzing Comments...

      </div>

    </div>

  </div>

  <script src="chart.js"></script>

  <script src="popup.js"></script>

</body>

</html>
