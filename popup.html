<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>YouTube Sentiment Analyzer</title>

  <style>
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #0f172a; /* Sleek slate background */
      color: #f8fafc;
      margin: 0;
      padding: 16px;
      width: 500px; /* Widened for dashboard feel */
    }

    h1 {
      font-size: 20px;
      margin-top: 0;
      margin-bottom: 16px;
      text-align: center;
      color: #38bdf8;
      letter-spacing: 0.5px;
    }

    .section {
      background: #1e293b;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid #334155;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .section-title {
      font-size: 14px;
      margin-bottom: 12px;
      color: #7dd3fc;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .metric {
      background: #0f172a;
      padding: 12px 8px;
      border-radius: 8px;
      text-align: center;
      border: 1px solid #334155;
    }

    .metric-title { font-size: 11px; color: #94a3b8; margin-bottom: 4px; text-transform: uppercase;}
    .metric-value { font-size: 18px; font-weight: bold; }
    
    .text-pos { color: #4ade80; }
    .text-neu { color: #facc15; }
    .text-neg { color: #f87171; }

    .charts-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-items: center;
    }

    canvas { max-height: 200px; width: 100% !important; }

    .keywords-container {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }

    .keyword-box {
      flex: 1;
      background: #0f172a;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #334155;
      font-size: 12px;
    }

    .keyword-box span {
      display: inline-block;
      padding: 2px 6px;
      background: #334155;
      border-radius: 4px;
      margin: 2px;
      font-size: 11px;
    }

    .controls, .sub-controls {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    button {
      flex: 1;
      background: #334155;
      color: #fff;
      border: none;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s;
    }

    button:hover { background: #475569; transform: translateY(-1px); }
    button.active { background: #38bdf8; color: #0f172a; }

    .btn-export {
      background: #10b981;
      flex: 0 0 auto;
      padding: 8px 16px;
    }
    .btn-export:hover { background: #059669; }

    input, select {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border-radius: 6px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #fff;
      font-size: 13px;
      box-sizing: border-box;
      outline: none;
    }
    input:focus, select:focus { border-color: #38bdf8; }

    .comment-list {
      max-height: 300px;
      overflow-y: auto;
      padding-right: 4px;
    }

    /* Custom Scrollbar */
    .comment-list::-webkit-scrollbar { width: 6px; }
    .comment-list::-webkit-scrollbar-track { background: #0f172a; }
    .comment-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

    .comment {
      background: #0f172a;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      font-size: 13px;
      line-height: 1.5;
      border-left: 4px solid #334155;
      transition: background 0.2s;
    }

    .comment:hover { background: #1e293b; }
    .comment.pos-border { border-left-color: #4ade80; }
    .comment.neu-border { border-left-color: #facc15; }
    .comment.neg-border { border-left-color: #f87171; }

    .badge {
      margin-top: 8px;
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: bold;
      text-transform: uppercase;
    }
    .positive { background: rgba(74, 222, 128, 0.2); color: #4ade80; }
    .neutral { background: rgba(250, 204, 21, 0.2); color: #facc15; }
    .negative { background: rgba(248, 113, 113, 0.2); color: #f87171; }

    #output { min-height: 100px; }
    .loading { text-align: center; padding: 40px 20px; color: #94a3b8; font-size: 14px; }
    .spinner {
      border: 3px solid #334155;
      border-top: 3px solid #38bdf8;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <h1>YouTube Sentiment Analyzer</h1>

  <div id="output">
    <div class="section">
      <div class="loading">
        <div class="spinner"></div>
        Analyzing Comments...
      </div>
    </div>
  </div>

  <script src="chart.js"></script>
  <script src="popup.js"></script>

</body>
</html>
