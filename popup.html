<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>YouTube Sentiment Analyzer</title>

    <style>
        body {
            width: 420px;
            height: 550px;
            margin: 0;
            padding: 12px;
            font-family: Arial, sans-serif;
            background: #000000; /* PURE BLACK */
            color: #ffffff;
        }

        h1 {
            font-size: 18px;
            margin-bottom: 10px;
        }

        #status {
            font-size: 13px;
            margin-bottom: 10px;
            color: #aaa;
        }

        #summary {
            background: #111;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid #222;
        }

        .badge {
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            margin-right: 5px;
        }

        .positive { background: #16a34a; color: #fff; }
        .neutral { background: #ca8a04; color: #000; }
        .negative { background: #dc2626; color: #fff; }

        #comments {
            max-height: 320px;
            overflow-y: auto;
        }

        .comment {
            background: #111;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 8px;
            border: 1px solid #222;
        }

        .comment-text {
            margin-bottom: 6px;
            font-size: 13px;
            line-height: 1.4;
        }

        /* Scrollbar */
        #comments::-webkit-scrollbar {
            width: 6px;
        }

        #comments::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <h1>YouTube Sentiment Analyzer</h1>

    <div id="status">Initializing...</div>

    <div id="summary"></div>

    <div id="comments"></div>

    <script src="popup.js"></script>

</body>
</html>
